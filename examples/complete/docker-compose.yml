
x-minio-common: &minio-common
  image: quay.io/minio/minio
  command: server http://minio-{1..3}/mnt/data{1...2} --console-address ":9001"
  environment:
    MINIO_ROOT_USER: minio-admin
    MINIO_ROOT_PASSWORD: minio-admin
    MINIO_API_SYNC_EVENTS: on
  healthcheck:
    test: [ "CMD", "mc", "ready", "local" ]
    interval: 5s
    timeout: 5s
    retries: 5

services:
  minio-1:
    <<: *minio-common
    volumes:
      - minio-data1-1:/mnt/data1
      - minio-data1-2:/mnt/data2

  minio-2:
    <<: *minio-common
    volumes:
      - minio-data2-1:/mnt/data1
      - minio-data2-2:/mnt/data2

  minio-3:
    <<: *minio-common
    volumes:
      - minio-data3-1:/mnt/data1
      - minio-data3-2:/mnt/data2

  nginx:
    image: nginx:1.19.2-alpine
    hostname: nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9000:9000"
      - "9001:9001"
    depends_on:
      - minio-1
      - minio-2
      - minio-3

volumes:
  minio-data1-1:
    driver: local
    driver_opts:
      type: none
      device: ./data/1.1
      o: bind
  minio-data1-2:
    driver: local
    driver_opts:
      type: none
      device: ./data/1.2
      o: bind
  minio-data2-1:
    driver: local
    driver_opts:
      type: none
      device: ./data/2.1
      o: bind
  minio-data2-2:
    driver: local
    driver_opts:
      type: none
      device: ./data/2.2
      o: bind
  minio-data3-1:
    driver: local
    driver_opts:
      type: none
      device: ./data/3.1
      o: bind
  minio-data3-2:
    driver: local
    driver_opts:
      type: none
      device: ./data/3.2
      o: bind
