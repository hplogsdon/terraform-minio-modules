name: Release

on:
  push:
    branches:
      - trunk
      - master
    paths:
      - "**/*.tf"
      - ".github/workflows/*"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.repository_owner == 'hplogsdon'
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '0'

      - uses: actions-ecosystem/action-get-latest-tag@v1
        id: last_tag
        with:
          semver_only: true

      - run: |
          NEW_TAG_NAME=$(echo ${{ steps.get-latest-tag.outputs.tag }} | sed 's/v//g')
          NEW_LEVEL=$(echo ${{ steps.last_tag.outputs.level }})
          echo $NEW_TAG_NAME
          echo $NEW_LEVEL

      - uses: actions-ecosystem/action-bump-semver@v1
        id: bump_semver
        if: ${{ steps.release_label.outputs.level != null }}
        with:
          current_version: ${{ steps.last_tag.outputs.tag }}
          level: ${{ steps.last_tag.outputs.level }}

      - uses: actions-ecosystem/action-push-tag@v1
        if: ${{ steps.last_tag.outputs.level != null }}
        with:
          tag: ${{ steps.bump_semver.outputs.new_version }}
          message: '${{ steps.bump_semver.outputs.new_version }}: PR #${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}'
