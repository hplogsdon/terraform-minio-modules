name: Tag

on:
  push:
    branches:
      - trunk
      - master
    paths:
      - "**/*.tf"
      - ".github/workflows/*"

jobs:
  tag:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'hplogsdon'
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: '0'

      - id: semver
        uses: ietf-tools/semver-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.event.workflow_run.head_sha }}


      - run: |
          echo "${{ steps.semver.outputs.next  }}"
          echo "SEMVER_TAG=$(echo ${{ steps.semver.outputs.next  }})" >> $GITHUB_OUTPUT 

      - name: Generate CHANGELOG
        id: changelog
        uses: requarks/changelog-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fromTag: ${{ github.event.workflow_run.head_sha }}
          toTag: ${{ steps.semver.outputs.current }}
          writeToFile: false

      - name: Create Release
        uses: ncipollo/release-action@v1.13.0
        with:
          allowUpdates: true
          draft: false
          makeLatest: true
          tag: ${{ steps.semver.outputs.next }}
          commit: ${{ github.event.workflow_run.head_sha }}
          body: ${{ steps.changelog.outputs.changes }}
          token: ${{ secrets.GITHUB_TOKEN }}

