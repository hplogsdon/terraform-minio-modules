name: Release

on:
  pull_request:
    types:
      - closed

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.repository_owner == 'hplogsdon'
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '0'

      - uses: actions-ecosystem/action-get-merged-pull-request@v1
        id: get_merged
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions-ecosystem/action-release-label@v1
        id: release_label
        if: ${{ steps.get_merged.outputs.title != null }}
        with:
          labels: ${{ steps.get_merged.outputs.labels }}

      - uses: actions-ecosystem/action-get-latest-tag@v1
        id: last_tag
        if: ${{ steps.release_label.outputs.level != null }}
        with:
          semver_only: true

      - uses: actions-ecosystem/action-bump-semver@v1
        id: bump_semver
        if: ${{ steps.release_label.outputs.level != null }}
        with:
          current_version: ${{ steps.last_tag.outputs.tag }}
          level: ${{ steps.last_tag.outputs.level }}

      - uses: actions-ecosystem/action-push-tag@v1
        if: ${{ steps.last_tag.outputs.level != null }}
        with:
          tag: ${{ steps.bump_semver.outputs.new_version }}
          message: '${{ steps.bump_semver.outputs.new_version }}: PR #${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}'

      - id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.last_tag.outputs.tag }}
          release_name: Release ${{ steps.last_tag.outputs.tag }}
          draft: false
          prerelease: false
